<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BiblioTech</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">📚 BiblioTech</a>

        <div>
            <a class="btn btn-outline-light btn-sm" href="/libros/">Libros</a>
            <a class="btn btn-outline-light btn-sm" href="/autores/">Autores</a>
            <a class="btn btn-outline-info btn-sm" href="/buscar/">Buscar</a>
            <a class="btn btn-outline-info btn-sm" href="/filtros/">Filtros</a>
            <a class="btn btn-outline-warning btn-sm" href="/dashboard/">Dashboard</a>

            {% if user.is_authenticated %}
                <a class="btn btn-success btn-sm" href="/perfil/">Perfil</a>
                <a class="btn btn-warning btn-sm" href="/mis-prestamos/">Mis préstamos</a>
                <a class="btn btn-danger btn-sm" href="/logout/">Salir</a>
            {% else %}
                <a class="btn btn-primary btn-sm" href="/login/">Login</a>
                <a class="btn btn-info btn-sm" href="/registro/">Registro</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
